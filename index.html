<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendário Financeiro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
/* ── CONFIG: troque aqui suas credenciais ── */
/* veja o bloco <script> no final do arquivo */

:root {
  --bg:        #f7f5f0;
  --surface:   #ffffff;
  --border:    #e8e4dd;
  --border2:   #d4cfc6;
  --text:      #1a1916;
  --muted:     #7a7570;
  --accent:    #2a5bd7;
  --accent-dk: #1e44a8;
  --rec-color: #1D9E75;
  --dep-color: #d94040;
  --font-h:    'DM Serif Display', serif;
  --font-b:    'DM Sans', sans-serif;
  --rad:       10px;
  --rad-lg:    16px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; }
body { font-family: var(--font-b); background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── AUTH ── */
#authScreen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg);
}
.auth-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--rad-lg);
  padding: 2.5rem 2rem;
  width: 360px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.06);
}
.auth-logo { font-family: var(--font-h); font-size: 1.7rem; margin-bottom: 0.25rem; color: var(--text); }
.auth-sub  { font-size: 0.82rem; color: var(--muted); margin-bottom: 2rem; }
.auth-tabs { display: flex; gap: 0; margin-bottom: 1.5rem; border: 1px solid var(--border); border-radius: var(--rad); overflow: hidden; }
.auth-tab  { flex: 1; padding: 8px; text-align: center; cursor: pointer; font-size: 0.85rem; font-weight: 500; background: none; border: none; color: var(--muted); }
.auth-tab.active { background: var(--accent); color: #fff; }
.field { margin-bottom: 1rem; }
.field label { display: block; font-size: 0.78rem; color: var(--muted); margin-bottom: 4px; font-weight: 500; letter-spacing: 0.03em; text-transform: uppercase; }
.field input { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--rad); font-family: var(--font-b); font-size: 0.9rem; background: var(--bg); color: var(--text); outline: none; transition: border-color .15s; }
.field input:focus { border-color: var(--accent); }
.btn-full { width: 100%; padding: 11px; background: var(--accent); color: #fff; border: none; border-radius: var(--rad); font-family: var(--font-b); font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: background .15s; }
.btn-full:hover { background: var(--accent-dk); }
.auth-msg { font-size: 0.82rem; color: var(--dep-color); margin-top: 0.75rem; text-align: center; min-height: 1.2em; }

/* ── APP SHELL ── */
#appScreen { display: none; min-height: 100vh; }
.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 1.5rem;
  height: 54px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky; top: 0; z-index: 50;
}
.topbar-logo { font-family: var(--font-h); font-size: 1.2rem; color: var(--text); }
.topbar-right { display: flex; align-items: center; gap: 12px; }
.topbar-email { font-size: 0.78rem; color: var(--muted); }
.btn-sm { padding: 6px 12px; border-radius: var(--rad); border: 1px solid var(--border); background: none; font-family: var(--font-b); font-size: 0.8rem; cursor: pointer; color: var(--text); display: inline-flex; align-items: center; gap: 5px; transition: background .12s; }
.btn-sm:hover { background: var(--bg); }
.btn-sm.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-sm.primary:hover { background: var(--accent-dk); }

.main { max-width: 1040px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }

/* ── TABS ── */
.tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; }
.tab { padding: 9px 18px; font-size: 0.85rem; font-weight: 500; cursor: pointer; border: none; background: none; color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -1px; font-family: var(--font-b); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ── CALENDAR HEADER ── */
.cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; flex-wrap: wrap; gap: 10px; }
.month-nav { display: flex; align-items: center; gap: 10px; }
.month-title { font-family: var(--font-h); font-size: 1.6rem; color: var(--text); min-width: 210px; }
.nav-btn { width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--border); background: var(--surface); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1rem; color: var(--text); transition: background .12s; }
.nav-btn:hover { background: var(--bg); }
.cal-actions { display: flex; gap: 8px; }

/* ── SUMMARY ── */
.summary { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.25rem; }
.sum-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--rad); padding: 14px 16px; }
.sum-label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; margin-bottom: 5px; }
.sum-value { font-size: 1.4rem; font-weight: 600; }
.sum-value.r { color: var(--rec-color); }
.sum-value.d { color: var(--dep-color); }

/* ── LEGEND ── */
.legend { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 1rem; }
.leg { display: flex; align-items: center; gap: 5px; font-size: 0.75rem; color: var(--muted); }
.dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.dot.critico { background: #d94040; }
.dot.urgente { background: #e8960a; }
.dot.normal  { background: #2a5bd7; }
.dot.baixo   { background: #1D9E75; }

/* ── CALENDAR GRID ── */
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
.day-hdr { text-align: center; font-size: 0.7rem; font-weight: 600; color: var(--muted); padding: 5px 0; text-transform: uppercase; letter-spacing: 0.05em; }
.day-cell {
  min-height: 96px;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 5px;
  cursor: pointer;
  background: var(--surface);
  transition: border-color .12s, box-shadow .12s;
  overflow: hidden;
}
.day-cell:hover { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(42,91,215,.08); }
.day-cell.empty { background: var(--bg); opacity: 0.4; cursor: default; pointer-events: none; }
.day-cell.today { border-color: var(--accent); border-width: 1.5px; }
.day-num { font-size: 0.75rem; font-weight: 600; color: var(--muted); margin-bottom: 3px; }
.day-cell.today .day-num { color: var(--accent); }
.day-totals { display: flex; flex-direction: column; gap: 1px; margin-bottom: 3px; }
.day-tot { font-size: 0.65rem; font-weight: 600; line-height: 1.3; }
.day-tot.r { color: var(--rec-color); }
.day-tot.d { color: var(--dep-color); }
.pills { display: flex; flex-direction: column; gap: 1px; }
.pill {
  font-size: 0.6rem;
  padding: 1px 4px;
  border-radius: 3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.6;
}
.pill.critico { background: #fde8e8; color: #8b1a1a; }
.pill.urgente { background: #fef3d0; color: #7a4800; }
.pill.normal  { background: #deeafe; color: #1a3a8a; }
.pill.baixo   { background: #d7f3e8; color: #0a4d2e; }
.more { font-size: 0.6rem; color: var(--muted); }

/* ── MODAL ── */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(10,10,10,.45);
  z-index: 200;
  align-items: flex-start;
  justify-content: center;
  padding: 50px 12px 24px;
  overflow-y: auto;
}
.overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border-radius: var(--rad-lg);
  border: 1px solid var(--border);
  width: 480px; max-width: 100%;
  box-shadow: 0 8px 32px rgba(0,0,0,.12);
}
.modal-hdr {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; background: var(--surface); border-radius: var(--rad-lg) var(--rad-lg) 0 0; z-index: 1;
}
.modal-title { font-family: var(--font-h); font-size: 1.1rem; }
.close-btn { background: none; border: none; cursor: pointer; font-size: 1.3rem; color: var(--muted); line-height: 1; padding: 2px 6px; border-radius: 6px; }
.close-btn:hover { background: var(--bg); }
.modal-body { padding: 16px 20px; }

.flabel { font-size: 0.75rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; }
.finput, .fselect {
  width: 100%; padding: 9px 11px;
  border: 1px solid var(--border); border-radius: var(--rad);
  font-family: var(--font-b); font-size: 0.88rem;
  background: var(--bg); color: var(--text);
  outline: none; transition: border-color .12s;
}
.finput:focus, .fselect:focus { border-color: var(--accent); background: var(--surface); }
.frow { margin-bottom: 12px; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

.sec-title { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); margin: 16px 0 8px; }

.lanc-item {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 11px; border-radius: var(--rad);
  border: 1px solid var(--border); margin-bottom: 6px;
  background: var(--surface);
}
.lanc-item.is-rec { background: #f7f5f0; }
.li-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.li-info { flex: 1; min-width: 0; }
.li-desc { font-size: 0.85rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.li-meta { font-size: 0.72rem; color: var(--muted); margin-top: 1px; }
.li-val { font-size: 0.85rem; font-weight: 600; white-space: nowrap; }
.li-val.r { color: var(--rec-color); }
.li-val.d { color: var(--dep-color); }
.li-val.x { font-size: 0.72rem; color: var(--muted); font-style: italic; font-weight: 400; }
.del-btn { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 0.9rem; flex-shrink: 0; padding: 3px 5px; border-radius: 5px; }
.del-btn:hover { color: var(--dep-color); background: #fde8e8; }
.badge-rec { font-size: 0.65rem; background: #d7f3e8; color: #0a4d2e; border-radius: 20px; padding: 1px 6px; margin-left: 4px; }

/* ── RECORRENTES TAB ── */
.rec-list-item {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px; border-radius: var(--rad);
  border: 1px solid var(--border); margin-bottom: 7px;
  background: var(--surface);
}
.rec-day { width: 40px; height: 40px; border-radius: 10px; background: var(--bg); border: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0; }
.rec-day-n { font-size: 1.1rem; font-weight: 700; line-height: 1; color: var(--text); }
.rec-day-l { font-size: 0.6rem; color: var(--muted); }
.rec-info { flex: 1; min-width: 0; }
.rec-desc { font-size: 0.9rem; font-weight: 500; }
.rec-meta { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
.rec-val { font-size: 0.88rem; font-weight: 600; white-space: nowrap; }
.rec-val.r { color: var(--rec-color); }
.rec-val.d { color: var(--dep-color); }
.rec-val.x { font-size: 0.75rem; color: var(--muted); font-style: italic; font-weight: 400; }
.empty-state { text-align: center; padding: 3rem 1rem; color: var(--muted); font-size: 0.88rem; }
.empty-state .big { font-size: 2.5rem; margin-bottom: 0.5rem; }

/* ── LOADING ── */
.loader { display: flex; align-items: center; justify-content: center; padding: 2rem; gap: 8px; color: var(--muted); font-size: 0.85rem; }
.spinner { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── TOAST ── */
#toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(60px);
  background: #1a1916; color: #fff; padding: 10px 20px; border-radius: 30px;
  font-size: 0.82rem; z-index: 999; transition: transform .25s; pointer-events: none;
}
#toast.show { transform: translateX(-50%) translateY(0); }

@media (max-width: 600px) {
  .day-cell { min-height: 64px; padding: 4px 3px; }
  .month-title { font-size: 1.2rem; min-width: auto; }
  .grid2, .grid3 { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- ── AUTH SCREEN ── -->
<div id="authScreen">
  <div class="auth-card">
    <div class="auth-logo">📅 Financeiro</div>
    <div class="auth-sub">Calendário financeiro pessoal</div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="setAuthTab('login')">Entrar</button>
      <button class="auth-tab" onclick="setAuthTab('signup')">Criar conta</button>
    </div>
    <div id="authForm">
      <div class="field"><label>E-mail</label><input type="email" id="authEmail" placeholder="seu@email.com" /></div>
      <div class="field"><label>Senha</label><input type="password" id="authPass" placeholder="••••••••" /></div>
      <button class="btn-full" onclick="doAuth()">Entrar</button>
    </div>
    <div class="auth-msg" id="authMsg"></div>
  </div>
</div>

<!-- ── APP SCREEN ── -->
<div id="appScreen">
  <div class="topbar">
    <span class="topbar-logo">📅 Calendário Financeiro</span>
    <div class="topbar-right">
      <span class="topbar-email" id="topEmail"></span>
      <button class="btn-sm" onclick="doLogout()">Sair</button>
    </div>
  </div>
  <div class="main">
    <div class="tabs">
      <button class="tab active" onclick="setTab('cal', this)">Calendário</button>
      <button class="tab" onclick="setTab('rec', this)">Recorrentes</button>
    </div>

    <!-- CALENDÁRIO -->
    <div id="tabCal">
      <div class="cal-header">
        <div class="month-nav">
          <button class="nav-btn" onclick="changeMonth(-1)">&#8249;</button>
          <span class="month-title" id="monthTitle"></span>
          <button class="nav-btn" onclick="changeMonth(1)">&#8250;</button>
        </div>
        <div class="cal-actions">
          <button class="btn-sm" onclick="exportExcel()">⬇ Excel</button>
          <button class="btn-sm" onclick="exportPDF()">⬇ PDF</button>
        </div>
      </div>
      <div class="summary" id="summary"></div>
      <div class="legend">
        <span class="leg"><span class="dot critico"></span> Crítico</span>
        <span class="leg"><span class="dot urgente"></span> Urgente</span>
        <span class="leg"><span class="dot normal"></span> Normal</span>
        <span class="leg"><span class="dot baixo"></span> Baixo</span>
        <span class="leg" style="margin-left:4px">↻ Recorrente</span>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>

    <!-- RECORRENTES -->
    <div id="tabRec" style="display:none">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
        <span style="font-size:0.85rem;color:var(--muted)">Contas que se repetem todo mês no mesmo dia</span>
        <button class="btn-sm primary" onclick="openRecModal()">+ Nova recorrente</button>
      </div>
      <div id="recList"></div>
    </div>
  </div>
</div>

<!-- ── MODAL ── -->
<div class="overlay" id="overlay" onclick="handleOverlay(event)">
  <div class="modal">
    <div class="modal-hdr">
      <span class="modal-title" id="modalTitle"></span>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<div id="toast"></div>

<script>
// ══════════════════════════════════════════════
//  ⚙️  CONFIGURAÇÃO — edite estas duas linhas
// ══════════════════════════════════════════════
const SUPABASE_URL  = 'https://judwzkefbakzpynqptxi.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp1ZHd6a2VmYmFrenB5bnFwdHhpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyOTA2NzAsImV4cCI6MjA5NDg2NjY3MH0.HIHq_f2Mrsp59sVeWHJ0BjZfHWJpI8Y_MBDHSctNCms';
// ══════════════════════════════════════════════

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

const MONTHS = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const DAYS   = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const PRI    = { critico:'Crítico', urgente:'Urgente', normal:'Normal', baixo:'Baixo' };

let curY = new Date().getFullYear();
let curM = new Date().getMonth();
let selDay = null;
let modalMode = 'day';
let lancamentos = [];
let recorrentes = [];
let currentUser = null;

// ── AUTH ──
let authMode = 'login';
function setAuthTab(m) {
  authMode = m;
  document.querySelectorAll('.auth-tab').forEach((t,i)=> t.classList.toggle('active', (i===0&&m==='login')||(i===1&&m==='signup')));
  document.getElementById('authMsg').textContent = '';
}
async function doAuth() {
  const email = document.getElementById('authEmail').value.trim();
  const pass  = document.getElementById('authPass').value;
  const msg   = document.getElementById('authMsg');
  if(!email||!pass){ msg.textContent='Preencha e-mail e senha.'; return; }
  msg.textContent = 'Aguarde...';
  const fn = authMode === 'login'
    ? sb.auth.signInWithPassword({email, password: pass})
    : sb.auth.signUp({email, password: pass});
  const { data, error } = await fn;
  if(error){ msg.textContent = error.message; return; }
  if(authMode==='signup' && !data.session){ msg.textContent='Verifique seu e-mail para confirmar o cadastro.'; return; }
}
async function doLogout() {
  await sb.auth.signOut();
}

// ── SESSION ──
sb.auth.onAuthStateChange(async (_event, session) => {
  if(session) {
    currentUser = session.user;
    document.getElementById('authScreen').style.display = 'none';
    document.getElementById('appScreen').style.display  = 'block';
    document.getElementById('topEmail').textContent = currentUser.email;
    await loadAll();
    render();
  } else {
    currentUser = null;
    document.getElementById('authScreen').style.display = 'flex';
    document.getElementById('appScreen').style.display  = 'none';
    lancamentos = []; recorrentes = [];
  }
});

// ── DATA ──
async function loadAll() {
  const [la, re] = await Promise.all([
    sb.from('lancamentos').select('*').order('data'),
    sb.from('recorrentes').select('*').order('dia')
  ]);
  lancamentos = la.data || [];
  recorrentes = re.data || [];
}

function getLancs(y,m,d) {
  const key = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  return lancamentos.filter(l => l.data === key);
}
function getRecs(d) { return recorrentes.filter(r => r.dia == d && r.ativo); }

// ── NAVIGATION ──
function changeMonth(dir) {
  curM += dir;
  if(curM>11){curM=0;curY++;} if(curM<0){curM=11;curY--;}
  render();
}

function setTab(t, el) {
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tabCal').style.display = t==='cal'?'':'none';
  document.getElementById('tabRec').style.display = t==='rec'?'':'none';
  if(t==='rec') renderRecList();
}

// ── RENDER ──
function render() {
  document.getElementById('monthTitle').textContent = `${MONTHS[curM]} ${curY}`;
  renderSummary();
  renderGrid();
}

function renderSummary() {
  const days = new Date(curY, curM+1, 0).getDate();
  let rec=0, dep=0;
  for(let d=1;d<=days;d++){
    getLancs(curY,curM,d).forEach(l=>{ if(l.tipo==='receita') rec+=l.valor||0; else dep+=l.valor||0; });
    getRecs(d).forEach(r=>{ if(r.valor){ if(r.tipo==='receita') rec+=r.valor; else dep+=r.valor; }});
  }
  document.getElementById('summary').innerHTML=`
    <div class="sum-card"><div class="sum-label">Receitas</div><div class="sum-value r">R$ ${rec.toLocaleString('pt-BR',{minimumFractionDigits:2})}</div></div>
    <div class="sum-card"><div class="sum-label">Despesas</div><div class="sum-value d">R$ ${dep.toLocaleString('pt-BR',{minimumFractionDigits:2})}</div></div>`;
}

function renderGrid() {
  const first = new Date(curY, curM, 1).getDay();
  const days  = new Date(curY, curM+1, 0).getDate();
  const today = new Date();
  let html = DAYS.map(d=>`<div class="day-hdr">${d}</div>`).join('');
  for(let i=0;i<first;i++) html+=`<div class="day-cell empty"></div>`;
  for(let d=1;d<=days;d++){
    const isToday = today.getFullYear()===curY&&today.getMonth()===curM&&today.getDate()===d;
    const la = getLancs(curY,curM,d), re = getRecs(d);
    let tr=0,td=0;
    la.forEach(l=>{ if(l.tipo==='receita') tr+=l.valor||0; else td+=l.valor||0; });
    re.forEach(r=>{ if(r.valor){ if(r.tipo==='receita') tr+=r.valor; else td+=r.valor; }});
    const all=[...la,...re.map(r=>({...r,_rec:true}))];
    let tots='';
    if(tr>0) tots+=`<div class="day-tot r">+${tr.toLocaleString('pt-BR',{minimumFractionDigits:2})}</div>`;
    if(td>0) tots+=`<div class="day-tot d">-${td.toLocaleString('pt-BR',{minimumFractionDigits:2})}</div>`;
    let pills = all.slice(0,3).map(l=>`<div class="pill ${l.prioridade||'normal'}">${l._rec?'↻ ':''}${l.descricao}</div>`).join('');
    if(all.length>3) pills+=`<div class="more">+${all.length-3}</div>`;
    html+=`<div class="day-cell${isToday?' today':''}" onclick="openDay(${d})">
      <div class="day-num">${d}</div>
      <div class="day-totals">${tots}</div>
      <div class="pills">${pills}</div>
    </div>`;
  }
  document.getElementById('calGrid').innerHTML = html;
}

// ── DAY MODAL ──
function openDay(d) {
  selDay=d; modalMode='day';
  document.getElementById('modalTitle').textContent = `${d} de ${MONTHS[curM]} de ${curY}`;
  document.getElementById('modalBody').innerHTML = buildDayBody();
  document.getElementById('overlay').classList.add('open');
}
function buildDayBody() {
  const la=getLancs(curY,curM,selDay), re=getRecs(selDay);
  return `
  <div class="grid2">
    <div class="frow"><div class="flabel">Descrição</div><input class="finput" id="fDesc" placeholder="Ex: Conta de luz" /></div>
    <div class="frow"><div class="flabel">Valor (R$) — opcional</div><input class="finput" id="fValor" type="number" min="0" step="0.01" placeholder="Deixe vazio se não souber" /></div>
  </div>
  <div class="grid3">
    <div class="frow"><div class="flabel">Tipo</div><select class="fselect" id="fTipo"><option value="despesa">Despesa</option><option value="receita">Receita</option></select></div>
    <div class="frow"><div class="flabel">Prioridade</div><select class="fselect" id="fPri"><option value="normal">Normal</option><option value="critico">🔴 Crítico</option><option value="urgente">🟡 Urgente</option><option value="baixo">🟢 Baixo</option></select></div>
    <div class="frow"><div class="flabel">Categoria</div><input class="finput" id="fCat" placeholder="Ex: Fixas" /></div>
  </div>
  <button class="btn-full" style="margin-bottom:4px" onclick="addLanc()">+ Adicionar lançamento</button>
  ${re.length?`<div class="sec-title">↻ Recorrentes neste dia</div>${re.map(r=>`
    <div class="lanc-item is-rec">
      <span class="li-dot" style="background:${dotColor(r.prioridade||'normal')}"></span>
      <div class="li-info"><div class="li-desc">${r.descricao}<span class="badge-rec">recorrente</span></div><div class="li-meta">${PRI[r.prioridade||'normal']}${r.categoria?' · '+r.categoria:''}</div></div>
      <div class="li-val ${r.valor?(r.tipo==='receita'?'r':'d'):'x'}">${r.valor?`${r.tipo==='receita'?'+':'-'}R$ ${r.valor.toLocaleString('pt-BR',{minimumFractionDigits:2})}`:'a confirmar'}</div>
    </div>`).join('')}`:''}
  ${la.length?`<div class="sec-title">Lançamentos do dia</div>${la.map(l=>`
    <div class="lanc-item">
      <span class="li-dot" style="background:${dotColor(l.prioridade)}"></span>
      <div class="li-info"><div class="li-desc">${l.descricao}</div><div class="li-meta">${PRI[l.prioridade]}${l.categoria?' · '+l.categoria:''}${!l.valor?' · a confirmar':''}</div></div>
      <div class="li-val ${l.valor?(l.tipo==='receita'?'r':'d'):'x'}">${l.valor?`${l.tipo==='receita'?'+':'-'}R$ ${l.valor.toLocaleString('pt-BR',{minimumFractionDigits:2})}`:'a confirmar'}</div>
      <button class="del-btn" onclick="delLanc('${l.id}')">🗑</button>
    </div>`).join('')}`:''}
  ${!la.length&&!re.length?`<p style="text-align:center;color:var(--muted);font-size:0.85rem;padding:1rem 0">Nenhum lançamento neste dia</p>`:''}`;
}

async function addLanc() {
  const desc = document.getElementById('fDesc').value.trim();
  if(!desc){ toast('Informe a descrição.'); return; }
  const valorRaw = document.getElementById('fValor').value;
  const { error } = await sb.from('lancamentos').insert({
    user_id:   currentUser.id,
    data:      `${curY}-${String(curM+1).padStart(2,'0')}-${String(selDay).padStart(2,'0')}`,
    descricao: desc,
    valor:     valorRaw ? parseFloat(valorRaw) : null,
    tipo:      document.getElementById('fTipo').value,
    prioridade:document.getElementById('fPri').value,
    categoria: document.getElementById('fCat').value.trim() || null
  });
  if(error){ toast('Erro: '+error.message); return; }
  await loadAll(); render();
  document.getElementById('modalBody').innerHTML = buildDayBody();
  toast('Lançamento adicionado!');
}

async function delLanc(id) {
  if(!confirm('Remover este lançamento?')) return;
  await sb.from('lancamentos').delete().eq('id', id);
  await loadAll(); render();
  document.getElementById('modalBody').innerHTML = buildDayBody();
  toast('Removido.');
}

// ── RECORRENTES MODAL ──
function openRecModal(item=null) {
  modalMode = 'rec';
  document.getElementById('modalTitle').textContent = item ? 'Editar recorrente' : 'Nova recorrente';
  document.getElementById('modalBody').innerHTML = `
    <div class="grid2">
      <div class="frow"><div class="flabel">Descrição</div><input class="finput" id="rDesc" placeholder="Ex: Aluguel, Água, Salário..." value="${item?item.descricao:''}" /></div>
      <div class="frow"><div class="flabel">Dia do vencimento</div><input class="finput" id="rDia" type="number" min="1" max="31" placeholder="Ex: 10" value="${item?item.dia:''}" /></div>
    </div>
    <div class="grid2">
      <div class="frow"><div class="flabel">Valor (R$) — opcional</div><input class="finput" id="rValor" type="number" min="0" step="0.01" placeholder="Deixe vazio se variar" value="${item&&item.valor?item.valor:''}" /></div>
      <div class="frow"><div class="flabel">Tipo</div><select class="fselect" id="rTipo"><option value="despesa"${!item||item.tipo==='despesa'?' selected':''}>Despesa</option><option value="receita"${item&&item.tipo==='receita'?' selected':''}>Receita</option></select></div>
    </div>
    <div class="grid2">
      <div class="frow"><div class="flabel">Prioridade</div>
        <select class="fselect" id="rPri">
          <option value="normal"${!item||item.prioridade==='normal'?' selected':''}>Normal</option>
          <option value="critico"${item&&item.prioridade==='critico'?' selected':''}>🔴 Crítico</option>
          <option value="urgente"${item&&item.prioridade==='urgente'?' selected':''}>🟡 Urgente</option>
          <option value="baixo"${item&&item.prioridade==='baixo'?' selected':''}>🟢 Baixo</option>
        </select></div>
      <div class="frow"><div class="flabel">Categoria</div><input class="finput" id="rCat" placeholder="Ex: Contas fixas" value="${item?item.categoria||'':''}" /></div>
    </div>
    <button class="btn-full" onclick="saveRec(${item?`'${item.id}'`:null})">💾 Salvar</button>`;
  document.getElementById('overlay').classList.add('open');
}

async function saveRec(editId=null) {
  const desc = document.getElementById('rDesc').value.trim();
  const dia  = parseInt(document.getElementById('rDia').value);
  if(!desc||!dia||dia<1||dia>31){ toast('Preencha descrição e dia válido.'); return; }
  const valorRaw = document.getElementById('rValor').value;
  const payload = {
    descricao:  desc,
    dia,
    valor:      valorRaw ? parseFloat(valorRaw) : null,
    tipo:       document.getElementById('rTipo').value,
    prioridade: document.getElementById('rPri').value,
    categoria:  document.getElementById('rCat').value.trim() || null,
    ativo:      true
  };
  let error;
  if(editId) {
    ({ error } = await sb.from('recorrentes').update(payload).eq('id', editId));
  } else {
    ({ error } = await sb.from('recorrentes').insert({...payload, user_id: currentUser.id}));
  }
  if(error){ toast('Erro: '+error.message); return; }
  await loadAll(); render(); renderRecList();
  closeModal();
  toast('Recorrente salva!');
}

async function delRec(id) {
  if(!confirm('Remover esta recorrente?')) return;
  await sb.from('recorrentes').delete().eq('id', id);
  await loadAll(); render(); renderRecList();
  toast('Removida.');
}

function renderRecList() {
  const el = document.getElementById('recList');
  if(!recorrentes.length){ el.innerHTML=`<div class="empty-state"><div class="big">↻</div>Nenhuma recorrente cadastrada.<br>Adicione contas fixas como água, luz, aluguel, salário...</div>`; return; }
  const sorted = [...recorrentes].sort((a,b)=>a.dia-b.dia);
  el.innerHTML = sorted.map(r=>`
    <div class="rec-list-item">
      <div class="rec-day"><div class="rec-day-n">${r.dia}</div><div class="rec-day-l">todo mês</div></div>
      <span class="li-dot" style="background:${dotColor(r.prioridade||'normal')}"></span>
      <div class="rec-info">
        <div class="rec-desc">${r.descricao}</div>
        <div class="rec-meta">${PRI[r.prioridade||'normal']}${r.categoria?' · '+r.categoria:''}${r.tipo==='receita'?' · Receita':' · Despesa'}</div>
      </div>
      <div class="rec-val ${r.valor?(r.tipo==='receita'?'r':'d'):'x'}">${r.valor?`${r.tipo==='receita'?'+':'-'}R$ ${r.valor.toLocaleString('pt-BR',{minimumFractionDigits:2})}`:'valor a confirmar'}</div>
      <button class="btn-sm" style="margin-left:6px" onclick="openRecModal(${JSON.stringify(r).replace(/"/g,'&quot;')})">✏</button>
      <button class="del-btn" onclick="delRec('${r.id}')">🗑</button>
    </div>`).join('');
}

// ── EXPORT ──
function exportExcel() {
  const days = new Date(curY, curM+1, 0).getDate();
  const rows = [['Data','Descrição','Tipo','Valor (R$)','Prioridade','Categoria','Recorrente']];
  for(let d=1;d<=days;d++){
    const dt = `${String(d).padStart(2,'0')}/${String(curM+1).padStart(2,'0')}/${curY}`;
    getLancs(curY,curM,d).forEach(l=>rows.push([dt,l.descricao,l.tipo==='receita'?'Receita':'Despesa',l.valor||'',PRI[l.prioridade],l.categoria||'','Não']));
    getRecs(d).forEach(r=>rows.push([dt,r.descricao,r.tipo==='receita'?'Receita':'Despesa',r.valor||'a confirmar',PRI[r.prioridade||'normal'],r.categoria||'','Sim']));
  }
  const wb=XLSX.utils.book_new(), ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:14},{wch:28},{wch:10},{wch:14},{wch:12},{wch:18},{wch:10}];
  XLSX.utils.book_append_sheet(wb,ws,`${MONTHS[curM]} ${curY}`);
  XLSX.writeFile(wb,`Financeiro_${MONTHS[curM]}_${curY}.xlsx`);
}

function exportPDF() {
  const days = new Date(curY, curM+1, 0).getDate();
  const first= new Date(curY, curM, 1).getDay();
  const pc   = {critico:'#d94040',urgente:'#e8960a',normal:'#2a5bd7',baixo:'#1D9E75'};
  let cells=[...Array(first).fill(''),...Array.from({length:days},(_,i)=>i+1)];
  while(cells.length%7) cells.push('');
  let rows='';
  for(let r=0;r<cells.length/7;r++){
    rows+='<tr>';
    for(let c=0;c<7;c++){
      const d=cells[r*7+c];
      if(!d){rows+=`<td style="background:#f9f8f5;border:.5px solid #ddd;vertical-align:top;padding:5px;height:90px"></td>`;continue;}
      const la=getLancs(curY,curM,d),re=getRecs(d);
      let tr=0,td2=0;
      la.forEach(l=>{if(l.tipo==='receita')tr+=l.valor||0;else td2+=l.valor||0;});
      re.forEach(x=>{if(x.valor){if(x.tipo==='receita')tr+=x.valor;else td2+=x.valor;}});
      const all=[...la,...re.map(x=>({...x,_rec:true,prioridade:x.prioridade||'normal'}))];
      let pills=all.slice(0,3).map(l=>`<div style="font-size:8px;padding:1px 3px;border-radius:2px;background:${pc[l.prioridade||'normal']}22;color:${pc[l.prioridade||'normal']};margin-bottom:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${l._rec?'↻ ':''}${l.descricao}</div>`).join('');
      if(all.length>3) pills+=`<div style="font-size:8px;color:#888">+${all.length-3}</div>`;
      let tots='';
      if(tr>0) tots+=`<div style="font-size:8px;color:#1D9E75;font-weight:700">+R$ ${tr.toLocaleString('pt-BR',{minimumFractionDigits:2})}</div>`;
      if(td2>0) tots+=`<div style="font-size:8px;color:#d94040;font-weight:700">-R$ ${td2.toLocaleString('pt-BR',{minimumFractionDigits:2})}</div>`;
      rows+=`<td style="border:.5px solid #ddd;vertical-align:top;padding:5px;height:90px"><div style="font-weight:700;font-size:11px;margin-bottom:2px">${d}</div>${tots}${pills}</td>`;
    }
    rows+='</tr>';
  }
  let tr2=0,td3=0;
  for(let d=1;d<=days;d++){
    getLancs(curY,curM,d).forEach(l=>{if(l.tipo==='receita')tr2+=l.valor||0;else td3+=l.valor||0;});
    getRecs(d).forEach(x=>{if(x.valor){if(x.tipo==='receita')tr2+=x.valor;else td3+=x.valor;}});
  }
  const win=window.open('','_blank');
  win.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><title>Calendário Financeiro — ${MONTHS[curM]} ${curY}</title>
  <style>@page{size:A4 landscape;margin:12mm}body{font-family:Georgia,serif;font-size:11px;color:#1a1916}h1{font-size:20px;margin-bottom:8px;font-weight:400}.sum{display:flex;gap:12px;margin-bottom:10px}.sc{background:#f7f5f0;border-radius:6px;padding:7px 12px}.sl{font-size:9px;color:#7a7570;text-transform:uppercase;letter-spacing:.05em}.sv{font-size:16px;font-weight:700;margin-top:1px}table{width:100%;border-collapse:collapse}th{background:#1a1916;color:#fff;font-size:9px;padding:5px;text-align:center;text-transform:uppercase;letter-spacing:.05em}td{vertical-align:top}.leg{display:flex;gap:12px;margin-bottom:8px;font-size:9px;color:#7a7570;align-items:center}.dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:2px}</style>
  </head><body>
  <h1>📅 Calendário Financeiro — ${MONTHS[curM]} ${curY}</h1>
  <div class="sum">
    <div class="sc"><div class="sl">Receitas</div><div class="sv" style="color:#1D9E75">R$ ${tr2.toLocaleString('pt-BR',{minimumFractionDigits:2})}</div></div>
    <div class="sc"><div class="sl">Despesas</div><div class="sv" style="color:#d94040">R$ ${td3.toLocaleString('pt-BR',{minimumFractionDigits:2})}</div></div>
  </div>
  <div class="leg"><span><span class="dot" style="background:#d94040"></span>Crítico</span><span><span class="dot" style="background:#e8960a"></span>Urgente</span><span><span class="dot" style="background:#2a5bd7"></span>Normal</span><span><span class="dot" style="background:#1D9E75"></span>Baixo</span><span>↻ Recorrente</span></div>
  <table><thead><tr>${DAYS.map(d=>`<th>${d}</th>`).join('')}</tr></thead><tbody>${rows}</tbody></table>
  <script>window.onload=()=>window.print()<\/script></body></html>`);
  win.document.close();
}

// ── UTILS ──
function dotColor(p){ return {critico:'#d94040',urgente:'#e8960a',normal:'#2a5bd7',baixo:'#1D9E75'}[p]||'#2a5bd7'; }
function closeModal(){ document.getElementById('overlay').classList.remove('open'); }
function handleOverlay(e){ if(e.target===document.getElementById('overlay')) closeModal(); }
let toastTimer;
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2400); }
</script>
</body>
</html>
